name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天凌晨2点运行代码扫描
    - cron: '0 2 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pylint bandit safety
    
    - name: Lint with pylint
      run: |
        pylint main.py web_app.py --exit-zero
    
    - name: Security scan with bandit
      run: |
        bandit -r . -f json -o bandit-report.json || true
    
    - name: Dependency security scan
      run: |
        safety check --json --output safety-report.json || true
    
    - name: Run tests with pytest
      run: |
        pytest tests/ --cov=. --cov-report=xml --cov-report=html
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

  codeql:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v2
      with:
        languages: python
    
    - name: Autobuild
      uses: github/codeql-action/autobuild@v2
    
    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v2

  sonarcloud:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Run tests with coverage
      run: |
        pytest tests/ --cov=. --cov-report=xml
    
    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  issue-automation:
    runs-on: ubuntu-latest
    needs: [test, codeql]
    if: always()
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Analyze test results
      id: analyze
      run: |
        # 检查测试是否失败
        if [ "${{ needs.test.result }}" = "failure" ]; then
          echo "TEST_FAILED=true" >> $GITHUB_OUTPUT
          echo "FAILURE_REASON=测试失败" >> $GITHUB_OUTPUT
        else
          echo "TEST_FAILED=false" >> $GITHUB_OUTPUT
        fi
        
        # 检查安全报告
        if [ -f "bandit-report.json" ]; then
          HIGH_ISSUES=$(python -c "import json; data=json.load(open('bandit-report.json')); print(sum(1 for r in data.get('results', []) if r.get('issue_severity') == 'HIGH'))")
          echo "HIGH_SECURITY_ISSUES=$HIGH_ISSUES" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Issue for Test Failures
      if: steps.analyze.outputs.TEST_FAILED == 'true'
      uses: actions/github-script@v6
      with:
        script: |
          const { data: issues } = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: ['bug', 'ci-failure']
          });
          
          // 检查是否已有相关issue
          const existingIssue = issues.find(issue => 
            issue.title.includes('CI 测试失败') && 
            issue.body.includes('${{ github.sha }}')
          );
          
          if (!existingIssue) {
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 CI 测试失败 - ${new Date().toISOString().split('T')[0]}`,
              body: `## CI 测试失败报告\n\n**提交:** ${{ github.sha }}\n**分支:** ${{ github.ref }}\n**原因:** ${{ steps.analyze.outputs.FAILURE_REASON }}\n\n请检查测试日志并修复问题。\n\n[查看运行详情](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
              labels: ['bug', 'ci-failure', 'high-priority']
            });
          }
    
    - name: Create Issue for Security Issues
      if: steps.analyze.outputs.HIGH_SECURITY_ISSUES > 0
      uses: actions/github-script@v6
      with:
        script: |
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🔒 发现高危安全漏洞 - ${new Date().toISOString().split('T')[0]}`,
            body: `## 安全扫描报告\n\n**发现高危漏洞:** ${{ steps.analyze.outputs.HIGH_SECURITY_ISSUES }} 个\n**提交:** ${{ github.sha }}\n\n请立即检查并修复安全漏洞。\n\n[查看安全报告](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            labels: ['security', 'high-priority', 'bug']
          });

  deploy:
    runs-on: ubuntu-latest
    needs: [test, codeql]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.test.result == 'success'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Deploy to Server
      env:
        DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        SERVER_USER: ${{ secrets.SERVER_USER }}
      run: |
        # 这里添加你的部署脚本
        echo "🚀 开始部署到生产环境..."
        echo "部署版本: ${{ github.sha }}"
        echo "部署时间: $(date)"
        
        # 示例部署命令（需要配置SSH密钥）
        # mkdir -p ~/.ssh
        # echo "$DEPLOY_KEY" > ~/.ssh/id_rsa
        # chmod 600 ~/.ssh/id_rsa
        # ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST "cd /opt/gildedwatch && git pull && systemctl restart gildedwatch"
        
        echo "✅ 部署完成（示例）"
    
    - name: Create Release Tag
      if: success()
      uses: actions/github-script@v6
      with:
        script: |
          const version = `v1.0.${Date.now().toString().slice(-6)}`;
          await github.rest.git.createRef({
            owner: context.repo.owner,
            repo: context.repo.repo,
            ref: `refs/tags/${version}`,
            sha: context.sha
          });
          
          await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: version,
            name: `Release ${version}`,
            body: `## 自动发布 ${version}\n\n**提交:** ${context.sha}\n**时间:** ${new Date().toISOString()}\n\n### 变更\n- CI/CD 自动化部署\n- 代码质量扫描\n- 安全检查`,
            draft: false,
            prerelease: false
          });