name: Issue Scanner & Reporter

on:
permissions:
  contents: read
  issues: write
  # 定时触发：每小时运行一次
  schedule:
    - cron: '0 * * * *'  # 每小时的第0分钟运行
  # 手动触发
  workflow_dispatch:
    inputs:
      scan_type:
        description: '扫描类型'
        required: true
        default: 'all'
        type: choice
        options:
        - all
        - open
        - closed
        - stale
      notify:
        description: '发送通知'
        required: false
        default: false
        type: boolean

jobs:
  scan-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        pip install requests python-dateutil
    
    - name: Scan Issues
      id: scan
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        REPO: ${{ github.repository }}
      run: |
        python << 'EOF'
        import os
        import requests
        import json
        from datetime import datetime, timedelta
        from dateutil import parser
        
        # 配置
        GITHUB_TOKEN = os.environ['GITHUB_TOKEN']
        REPO = os.environ['REPO']
        HEADERS = {
            'Authorization': f'token {GITHUB_TOKEN}',
            'Accept': 'application/vnd.github.v3+json'
        }
        
        def fetch_issues(state='all'):
            """获取指定状态的issues"""
            url = f'https://api.github.com/repos/{REPO}/issues'
            params = {
                'state': state,
                'per_page': 100,
                'sort': 'updated',
                'direction': 'desc'
            }
            
            issues = []
            page = 1
            
            while True:
                params['page'] = page
                response = requests.get(url, headers=HEADERS, params=params)
                response.raise_for_status()
                page_issues = response.json()
                
                if not page_issues:
                    break
                
                # 过滤掉pull requests（GitHub API返回的issues包含PRs）
                page_issues = [issue for issue in page_issues if 'pull_request' not in issue]
                issues.extend(page_issues)
                
                if len(page_issues) < 100:
                    break
                
                page += 1
            
            return issues
        
        def analyze_issues(issues):
            """分析issues数据"""
            now = datetime.now()
            seven_days_ago = now - timedelta(days=7)
            thirty_days_ago = now - timedelta(days=30)
            
            stats = {
                'total': len(issues),
                'open': 0,
                'closed': 0,
                'by_label': {},
                'stale_issues': [],  # 7天无更新
                'very_stale_issues': [],  # 30天无更新
                'no_label_issues': [],
                'urgent_issues': [],  # 有urgent、critical、bug标签
                'recent_issues': [],  # 最近7天创建
                'oldest_issues': []   # 最老的5个open issues
            }
            
            open_issues = []
            
            for issue in issues:
                # 统计状态
                if issue['state'] == 'open':
                    stats['open'] += 1
                    open_issues.append(issue)
                else:
                    stats['closed'] += 1
                
                # 统计标签
                labels = [label['name'] for label in issue['labels']]
                if not labels:
                    stats['no_label_issues'].append({
                        'number': issue['number'],
                        'title': issue['title'],
                        'url': issue['html_url']
                    })
                
                for label in labels:
                    stats['by_label'][label] = stats['by_label'].get(label, 0) + 1
                
                # 检查紧急程度
                urgent_labels = {'urgent', 'critical', 'bug', 'high-priority'}
                if any(label.lower() in urgent_labels for label in labels):
                    stats['urgent_issues'].append({
                        'number': issue['number'],
                        'title': issue['title'],
                        'labels': labels,
                        'url': issue['html_url']
                    })
                
                # 检查陈旧程度
                updated_at = parser.parse(issue['updated_at'])
                days_since_update = (now - updated_at).days
                
                if issue['state'] == 'open':
                    if days_since_update >= 30:
                        stats['very_stale_issues'].append({
                            'number': issue['number'],
                            'title': issue['title'],
                            'days_stale': days_since_update,
                            'url': issue['html_url']
                        })
                    elif days_since_update >= 7:
                        stats['stale_issues'].append({
                            'number': issue['number'],
                            'title': issue['title'],
                            'days_stale': days_since_update,
                            'url': issue['html_url']
                        })
                
                # 检查创建时间
                created_at = parser.parse(issue['created_at'])
                if (now - created_at).days <= 7:
                    stats['recent_issues'].append({
                        'number': issue['number'],
                        'title': issue['title'],
                        'state': issue['state'],
                        'url': issue['html_url']
                    })
            
            # 找出最老的5个open issues
            open_issues.sort(key=lambda x: parser.parse(x['created_at']))
            stats['oldest_issues'] = [
                {
                    'number': issue['number'],
                    'title': issue['title'],
                    'created_at': issue['created_at'],
                    'url': issue['html_url']
                }
                for issue in open_issues[:5]
            ]
            
            return stats
        
        def generate_report(stats):
            """生成扫描报告"""
            report = []
            report.append("# 📊 Issue 扫描报告")
            report.append(f"**扫描时间:** {datetime.now().strftime('%Y-%m-%d %H:%M:%S')}")
            report.append(f"**仓库:** {REPO}")
            report.append("")
            
            # 总体统计
            report.append("## 📈 总体统计")
            report.append(f"- **总Issues数:** {stats['total']}")
            report.append(f"- **Open Issues:** {stats['open']}")
            report.append(f"- **Closed Issues:** {stats['closed']}")
            report.append(f"- **解决率:** {stats['closed']/stats['total']*100:.1f}%" if stats['total'] > 0 else "- **解决率:** N/A")
            report.append("")
            
            # 标签统计
            if stats['by_label']:
                report.append("## 🏷️ 标签分布")
                for label, count in sorted(stats['by_label'].items(), key=lambda x: x[1], reverse=True):
                    report.append(f"- `{label}`: {count}")
                report.append("")
            
            # 问题区域
            report.append("## ⚠️ 需要关注的问题")
            
            if stats['urgent_issues']:
                report.append("### 🔴 紧急 Issues")
                for issue in stats['urgent_issues']:
                    report.append(f"- [#{issue['number']}]({issue['url']}) {issue['title']} (标签: {', '.join(issue['labels'])})")
                report.append("")
            
            if stats['very_stale_issues']:
                report.append("### 🕰️ 非常陈旧的 Issues (>30天无更新)")
                for issue in stats['very_stale_issues'][:10]:  # 只显示前10个
                    report.append(f"- [#{issue['number']}]({issue['url']}) {issue['title']} ({issue['days_stale']}天无更新)")
                report.append("")
            
            if stats['stale_issues']:
                report.append("### 🟡 陈旧的 Issues (7-30天无更新)")
                for issue in stats['stale_issues'][:10]:
                    report.append(f"- [#{issue['number']}]({issue['url']}) {issue['title']} ({issue['days_stale']}天无更新)")
                report.append("")
            
            if stats['no_label_issues']:
                report.append("### 🏷️ 无标签的 Issues")
                for issue in stats['no_label_issues'][:10]:
                    report.append(f"- [#{issue['number']}]({issue['url']}) {issue['title']}")
                report.append("")
            
            # 最近活动
            if stats['recent_issues']:
                report.append("## 🆕 最近7天创建的 Issues")
                for issue in stats['recent_issues'][:10]:
                    state_emoji = "🟢" if issue['state'] == 'open' else "🔴"
                    report.append(f"- {state_emoji} [#{issue['number']}]({issue['url']}) {issue['title']}")
                report.append("")
            
            # 最老的问题
            if stats['oldest_issues']:
                report.append("## 🧓 最老的 Open Issues")
                for issue in stats['oldest_issues']:
                    created_date = parser.parse(issue['created_at']).strftime('%Y-%m-%d')
                    days_old = (datetime.now() - parser.parse(issue['created_at'])).days
                    report.append(f"- [#{issue['number']}]({issue['url']}) {issue['title']} (创建于: {created_date}, {days_old}天前)")
                report.append("")
            
            # 建议
            report.append("## 💡 建议")
            if stats['stale_issues'] or stats['very_stale_issues']:
                report.append("1. **优先处理陈旧问题** - 考虑关闭或分配处理")
            if stats['no_label_issues']:
                report.append("2. **为无标签问题添加标签** - 便于分类和优先级管理")
            if stats['urgent_issues']:
                report.append("3. **立即处理紧急问题** - 避免影响项目进度")
            if stats['open'] > 20:
                report.append("4. **考虑批量处理** - Open Issues数量较多")
            
            return "\n".join(report)
        
        # 主逻辑
        try:
            print("🔍 开始扫描Issues...")
            
            # 获取所有issues
            all_issues = fetch_issues('all')
            print(f"📊 找到 {len(all_issues)} 个issues")
            
            # 分析数据
            stats = analyze_issues(all_issues)
            
            # 生成报告
            report = generate_report(stats)
            
            # 输出报告到文件
            with open('issue-scan-report.md', 'w', encoding='utf-8') as f:
                f.write(report)
            
            # 设置输出
            print("::set-output name=total_issues::" + str(stats['total']))
            print("::set-output name=open_issues::" + str(stats['open']))
            print("::set-output name=stale_issues::" + str(len(stats['stale_issues'])))
            print("::set-output name=urgent_issues::" + str(len(stats['urgent_issues'])))
            
            print("✅ 扫描完成！")
            
        except Exception as e:
            print(f"❌ 扫描失败: {e}")
            import traceback
            traceback.print_exc()
            exit(1)
        EOF
    
    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: issue-scan-report
        path: issue-scan-report.md
    
    - name: Create Summary Comment
      if: github.event_name == 'workflow_dispatch' || github.event.inputs.notify == 'true'
      uses: actions/github-script@v7
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      env:
        TOTAL_ISSUES: ${{ steps.scan.outputs.total_issues }}
        OPEN_ISSUES: ${{ steps.scan.outputs.open_issues }}
        STALE_ISSUES: ${{ steps.scan.outputs.stale_issues }}
        URGENT_ISSUES: ${{ steps.scan.outputs.urgent_issues }}
      with:
        script: |
          const reportContent = `## 📊 Issue 扫描结果
          
          **扫描时间:** ${new Date().toISOString()}
          **触发方式:** ${context.eventName === 'workflow_dispatch' ? '手动触发' : '定时扫描'}
          
          ### 关键指标
          - 📈 总Issues数: ${process.env.TOTAL_ISSUES || 'N/A'}
          - 🟢 Open Issues: ${process.env.OPEN_ISSUES || 'N/A'}
          - 🕰️ 陈旧Issues (7+天): ${process.env.STALE_ISSUES || 'N/A'}
          - 🔴 紧急Issues: ${process.env.URGENT_ISSUES || 'N/A'}
          
          ### 详细报告
          完整报告已生成为Artifact: [issue-scan-report.md](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
          
          ### 建议操作
          1. 下载Artifact查看完整报告
          2. 处理紧急和陈旧问题
          3. 为无标签问题添加标签`;
          
          // 在workflow run中创建评论
          await github.rest.actions.createWorkflowDispatchComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            run_id: context.runId,
            body: reportContent
          });
    
    - name: Send Notification (Optional)
      if: github.event.inputs.notify == 'true'
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        echo "📢 发送通知功能已配置"
        echo "如需发送到Slack/Discord，请配置对应的webhook secret"
        
        # 这里可以添加实际的webhook发送逻辑
        # 例如使用curl发送到Slack:
        # if [ -n "$SLACK_WEBHOOK_URL" ]; then
        #   curl -X POST -H 'Content-type: application/json' \
        #     --data "{\"text\":\"Issue扫描完成: ${{ steps.scan.outputs.total_issues }}个issues\"}" \
        #     $SLACK_WEBHOOK_URL
        # fi