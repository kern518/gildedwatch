name: Simple Issue Processor

on:
  # 当Issue被创建时触发
  issues:
    types: [opened]
  # 手动触发
  workflow_dispatch:
    inputs:
      issue_number:
        description: '要处理的Issue编号（留空处理所有）'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  process:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Process Issue
      uses: actions/github-script@v7
      with:
        script: |
          // 获取要处理的issue
          let issueNumber;
          
          if (context.eventName === 'issues') {
            // Issue事件触发
            issueNumber = context.payload.issue.number;
          } else if (context.eventName === 'workflow_dispatch') {
            // 手动触发
            issueNumber = context.payload.inputs.issue_number;
          }
          
          if (issueNumber) {
            console.log(`🔍 处理单个 Issue #${issueNumber}`);
            
            // 获取issue详情
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            
            console.log(`   标题: ${issue.title}`);
            console.log(`   状态: ${issue.state}`);
            
            // 简单的自动标签逻辑
            const title = issue.title.toLowerCase();
            const body = (issue.body || '').toLowerCase();
            const content = title + ' ' + body;
            const currentLabels = issue.labels.map(l => l.name);
            const newLabels = [...currentLabels];
            
            // 检测问题类型
            if (content.includes('bug') || content.includes('错误') || content.includes('修复')) {
              if (!newLabels.includes('bug')) newLabels.push('bug');
            } else if (content.includes('feature') || content.includes('功能') || content.includes('新功能')) {
              if (!newLabels.includes('enhancement')) newLabels.push('enhancement');
            } else if (content.includes('文档') || content.includes('documentation') || content.includes('typo')) {
              if (!newLabels.includes('documentation')) newLabels.push('documentation');
            } else if (content.includes('问题') || content.includes('question') || content.includes('如何')) {
              if (!newLabels.includes('question')) newLabels.push('question');
            }
            
            // 检测优先级
            if (content.includes('紧急') || content.includes('urgent') || content.includes('critical')) {
              // 移除其他优先级标签
              const priorityLabels = ['priority:critical', 'priority:high', 'priority:medium', 'priority:low'];
              newLabels = newLabels.filter(label => !priorityLabels.includes(label));
              newLabels.push('priority:critical');
            } else if (content.includes('重要') || content.includes('high')) {
              const priorityLabels = ['priority:critical', 'priority:high', 'priority:medium', 'priority:low'];
              newLabels = newLabels.filter(label => !priorityLabels.includes(label));
              newLabels.push('priority:high');
            }
            
            // 更新标签（如果有变化）
            if (JSON.stringify(newLabels.sort()) !== JSON.stringify(currentLabels.sort())) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: newLabels
              });
              
              console.log(`   更新标签: ${newLabels.join(', ')}`);
            }
            
            // 如果是新issue，添加欢迎评论
            if (issue.comments === 0) {
              const comment = `👋 你好！感谢你提交 Issue。

我已经自动分析了你的问题并添加了相关标签。

**下一步建议：**
1. 如果是bug，请提供复现步骤
2. 如果是功能请求，请描述具体需求
3. 如果是问题咨询，请明确问题

我会定期检查这个 Issue 并提供帮助。

---
*本评论由 Simple Issue Processor 自动生成*`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: comment
              });
              
              console.log(`   添加欢迎评论`);
            }
            
            console.log(`✅ Issue #${issueNumber} 处理完成`);
            
          } else {
            console.log('ℹ️  没有指定要处理的Issue');
          }
    
    - name: Summary
      run: |
        echo "✅ Issue处理任务完成"
        echo ""
        echo "📅 触发方式:"
        echo "  - Issue创建时自动触发"
        echo "  - 手动触发可指定Issue编号"
        echo ""
        echo "🔧 功能:"
        echo "  - 自动分类和标签"
        echo "  - 优先级标记"
        echo "  - 欢迎评论"