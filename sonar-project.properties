# SonarCloud 配置
sonar.organization=your-organization-name
sonar.projectKey=yourusername_gildedwatch

# 项目元数据
sonar.projectName=GildedWatch
sonar.projectVersion=1.0
sonar.projectDescription=黄金价格监控系统

# 源代码
sonar.sources=.
sonar.exclusions=**/tests/**,**/venv/**,**/.github/**,**/*.pyc

# 测试配置
sonar.tests=tests
sonar.test.inclusions=**/test_*.py
sonar.python.coverage.reportPaths=coverage.xml

# Python 配置
sonar.language=py
sonar.python.version=3.12

# 质量门禁
sonar.qualitygate.wait=true

# 安全扫描
sonar.security.config=./.sonar/security-config.json